<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' https://cdn.plot.ly https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; connect-src 'none'">
  <title>ISI Database</title>
  <link rel="icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.default.min.css">
  <link rel="stylesheet" href="assets/body.css">
</head>
<body>
  <div id="page_content">

    <div class="banner">
      <h1 class="banner_header">Interactive Sound Installations Database</h1>
      <a href="home.html" class="banner_link_fixed">HOME</a>
      <p class="spacer-sm"></p>
      <a href="glossary.html" class="banner_link">GLOSSARY</a>
      <p class="spacer-sm"></p>
      <a href="list.html" class="banner_link">LIST OF INSTALLATIONS</a>
    </div>

    <div class="page_columns">

      <div class="page_left">
        <div id="sunburst"></div>

        <div class="radio_buttons">
          <div class="radiobutton-group">
            <label>
              <input type="radio" name="select_plot" value="AI" checked>
              Artistic Intention
            </label>
            <label>
              <input type="radio" name="select_plot" value="IN">
              Interaction
            </label>
            <label>
              <input type="radio" name="select_plot" value="SD">
              System Design
            </label>
          </div>
        </div>
      </div>

      <div class="page_right">
        <div class="instruction_text">
          <h6 style="font-size:14pt;padding-left:70px;line-height:25pt">
            Select a sub-category by clicking on the diagram or choose it from the
            dropdown menu to get a list of the corresponding installations.
          </h6>
        </div>

        <div class="dropdown_container">
          <select id="dropdown_cat" multiple placeholder="Select one or more categories"></select>
        </div>
      </div>

    </div>

    <div id="list_inst" class="list_inst"></div>

    <!-- Credits injected by app.js -->
    <div class="credits_home"></div>

  </div>

  <script src="https://cdn.plot.ly/plotly-3.6.0.min.js" charset="utf-8"></script>
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
